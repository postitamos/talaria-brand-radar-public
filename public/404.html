<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <title>Brand Radar Public</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var location = window.location;
        var basePath = location.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
        var routePath = location.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~');
        var search = location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '';

        location.replace(
          location.protocol +
            '//' +
            location.hostname +
            (location.port ? ':' + location.port : '') +
            basePath +
            '/?/' +
            routePath +
            search +
            location.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
