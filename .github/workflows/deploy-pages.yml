name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths-ignore:
      - public/data/site_release_history.json
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip pages]')
    runs-on: ubuntu-latest
    env:
      VITE_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/
      VITE_PUBLIC_SIGNUP_SUPABASE_URL: ${{ secrets.VITE_PUBLIC_SIGNUP_SUPABASE_URL }}
      VITE_PUBLIC_SIGNUP_SUPABASE_ANON_KEY: ${{ secrets.VITE_PUBLIC_SIGNUP_SUPABASE_ANON_KEY }}
      VITE_PUBLIC_SIGNUP_FUNCTION_NAME: ${{ secrets.VITE_PUBLIC_SIGNUP_FUNCTION_NAME }}
      VITE_PUBLIC_SUPPORT_EMAIL: ${{ secrets.VITE_PUBLIC_SUPPORT_EMAIL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release manifest
        run: npm run build:release

      - name: Verify repo
        run: npm run verify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip pages]')
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip pages]')
    runs-on: ubuntu-latest
    needs: deploy
    env:
      VITE_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run live smoke test
        run: npm run smoke:live -- --base-url "${{ needs.deploy.outputs.page_url }}" --retries 8 --retry-delay-ms 5000
