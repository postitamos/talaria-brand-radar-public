<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function (location) {
        if (!location.search.startsWith('?/')) return;
        const decoded = location.search
          .slice(2)
          .split('&')
          .map(function (segment) {
            return segment.replace(/~and~/g, '&');
          })
          .join('?');

        const nextUrl = location.pathname.replace(/\/$/, '') + '/' + decoded + location.hash;
        window.history.replaceState(null, '', nextUrl);
      })(window.location);
    </script>
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Brand Radar Public: ranking transparente para decisores da cadeia de fornecimento, com metodologia aberta e newsletter gratuita."
    />
    <title>Brand Radar Public</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
